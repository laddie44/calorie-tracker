<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<title>Macro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f7; --bg3: #ebebed;
    --text: #000000; --text2: #6e6e73; --text3: #aeaeb2;
    --border: rgba(0,0,0,0.08); --radius: 18px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; max-width: 430px; margin: 0 auto; overflow-x: hidden;
  }
  .safe-top { height: env(safe-area-inset-top, 44px); background: var(--bg); }
  header {
    padding: 12px 24px 20px; background: var(--bg);
    position: sticky; top: 0; z-index: 100;
    border-bottom: 0.5px solid var(--border);
  }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .greeting { font-size: 13px; color: var(--text2); margin-bottom: 2px; }
  .name { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; line-height: 1.1; }
  .date-pill {
    margin-top: 10px; display: inline-block; background: var(--bg2);
    border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text2);
  }
  .refresh-btn {
    width: 36px; height: 36px; border-radius: 50%; background: var(--bg2);
    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; margin-top: 4px;
  }
  .refresh-btn svg { width: 16px; height: 16px; color: var(--text2); }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  main { padding: 0 0 40px; }
  .section { padding: 24px 24px 0; }
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px;
  }
  .calorie-card { background: var(--text); border-radius: var(--radius); padding: 24px; color: #fff; }
  .calorie-top { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
  .ring-wrap { position: relative; width: 96px; height: 96px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .ring-pct { font-size: 20px; font-weight: 700; color: #fff; line-height: 1; }
  .ring-sub { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .cal-info { flex: 1; }
  .cal-label { font-size: 12px; color: rgba(255,255,255,0.55); margin-bottom: 4px; }
  .cal-remain { font-size: 36px; font-weight: 700; color: #fff; line-height: 1; letter-spacing: -1.5px; }
  .cal-unit { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.6); margin-left: 2px; }
  .cal-meta { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 6px; }
  .cal-divider { height: 0.5px; background: rgba(255,255,255,0.12); margin-bottom: 16px; }
  .cal-stats { display: flex; justify-content: space-between; }
  .cal-stat { text-align: center; }
  .cal-stat-num { font-size: 18px; font-weight: 600; color: #fff; }
  .cal-stat-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }
  .macro-grid { display: flex; flex-direction: column; gap: 12px; }
  .macro-card { background: var(--bg2); border-radius: 14px; padding: 16px; }
  .macro-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .macro-name { font-size: 14px; font-weight: 500; }
  .macro-val { font-size: 13px; color: var(--text2); }
  .macro-bar-bg { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .macro-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .log-list { background: var(--bg2); border-radius: var(--radius); overflow: hidden; }
  .log-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; border-bottom: 0.5px solid var(--border);
    transition: opacity 0.3s;
  }
  .log-item:last-child { border-bottom: none; }
  .log-item.deleting { opacity: 0.3; pointer-events: none; }
  .log-left { flex: 1; min-width: 0; }
  .log-food { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-macros { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .log-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 12px; }
  .log-cal { font-size: 15px; font-weight: 600; }
  .log-cal-unit { font-size: 11px; font-weight: 400; color: var(--text3); }
  .delete-btn {
    width: 28px; height: 28px; border-radius: 50%;
    background: transparent; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3); transition: all 0.15s; flex-shrink: 0;
  }
  .delete-btn:active { background: #ffe5e5; color: #ff3b30; }
  .delete-btn svg { width: 14px; height: 14px; }
  .empty-state { padding: 40px 24px; text-align: center; }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .empty-sub { font-size: 14px; color: var(--text2); line-height: 1.5; }
  .sms-cta { background: var(--bg2); border-radius: var(--radius); padding: 20px; text-align: center; }
  .sms-number { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .sms-label { font-size: 13px; color: var(--text2); }
  .loading-state { padding: 60px 24px; text-align: center; color: var(--text2); font-size: 14px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--bg3); border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  .no-phone { padding: 60px 24px; text-align: center; }
  .no-phone-icon { font-size: 48px; margin-bottom: 16px; }
  .no-phone-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
  .no-phone-sub { font-size: 14px; color: var(--text2); line-height: 1.6; }
  .no-phone-number { font-size: 22px; font-weight: 700; margin-top: 20px; }

  /* Toast notification */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: #fff; padding: 12px 20px; border-radius: 100px;
    font-size: 14px; font-weight: 500; opacity: 0; transition: all 0.3s; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="safe-top"></div>
<header>
  <div class="header-row">
    <div>
      <div class="greeting" id="greeting">Good morning</div>
      <div class="name" id="username">Macro</div>
    </div>
    <button class="refresh-btn" onclick="loadData()" id="refresh-btn" aria-label="Refresh">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
    </button>
  </div>
  <div class="date-pill" id="date-pill">Today</div>
</header>
<main id="main-content">
  <div class="loading-state"><div class="spinner"></div>Loading your day...</div>
</main>
<div class="toast" id="toast"></div>

<script>
const TOKEN = 'patEiyxoH237fBgX6.a451d770b4ba97c24a7e5f949c1ab7fa4a09e162f7f1906f3808a80d7d2c4f76';
const BASE = 'app6vFHfJflNKS7RN';

let currentRecords = [];
let currentTotals = {};
let currentGoals = {};

function getPhone() {
  const p = new URLSearchParams(window.location.search).get('phone') || '';
  return p.replace(/\D/g, '');
}

function phoneWithPlus(p) {
  return p.startsWith('+') ? p : '+' + p;
}

function getGreeting() {
  const h = new Date().getHours();
  return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
}

function formatDate() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function isToday(t) {
  if (!t) return false;
  const n = new Date(), d = new Date(t);
  return n.getFullYear() === d.getFullYear() && n.getMonth() === d.getMonth() && n.getDate() === d.getDate();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function airtableFetch(table, formula) {
  const url = `https://api.airtable.com/v0/${BASE}/${encodeURIComponent(table)}?filterByFormula=${encodeURIComponent(formula)}&pageSize=100`;
  const r = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
  if (!r.ok) throw new Error('Airtable error ' + r.status);
  return (await r.json()).records;
}

async function deleteRecord(recordId) {
  const url = `https://api.airtable.com/v0/${BASE}/${encodeURIComponent('Food Logs')}/${recordId}`;
  const r = await fetch(url, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${TOKEN}` }
  });
  if (!r.ok) throw new Error('Delete failed');
}

async function handleDelete(recordId, itemEl) {
  if (!confirm('Delete this entry?')) return;
  itemEl.classList.add('deleting');
  try {
    await deleteRecord(recordId);
    itemEl.remove();
    showToast('Entry deleted ✓');
    loadData();
  } catch (e) {
    itemEl.classList.remove('deleting');
    showToast('Could not delete — try again');
  }
}

function ring(pct) {
  const r = 40, c = 2 * Math.PI * r, d = c * Math.min(pct / 100, 1);
  return `<svg width="96" height="96" viewBox="0 0 96 96"><circle cx="48" cy="48" r="${r}" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="8"/><circle cx="48" cy="48" r="${r}" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="8" stroke-dasharray="${d} ${c-d}" stroke-linecap="round"/></svg>`;
}

function bar(pct, color) {
  return `<div class="macro-bar-bg"><div class="macro-bar-fill" style="width:${Math.min(pct,100)}%;background:${color}"></div></div>`;
}

function trashIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path><path d="M10 11v6M14 11v6"></path><path d="M9 6V4h6v2"></path></svg>`;
}

function render(records, totals, goals, name) {
  const calPct = Math.round((totals.calories / goals.calories) * 100);
  const remain = Math.max(goals.calories - totals.calories, 0);

  const logHTML = records.length === 0
    ? `<div class="empty-state"><div class="empty-icon">🍽</div><div class="empty-title">Nothing logged yet</div><div class="empty-sub">Text your meals to the number below and they'll appear here.</div></div>`
    : records.map(r => `
        <div class="log-item" id="record-${r.id}">
          <div class="log-left">
            <div class="log-food">${r.fields['Food Description'] || 'Food item'}</div>
            <div class="log-macros">${r.fields['Protein (g)'] || 0}g P · ${r.fields['Carbs (g)'] || 0}g C · ${r.fields['Fat (g)'] || 0}g F</div>
          </div>
          <div class="log-right">
            <div class="log-cal">${r.fields['Calories'] || 0}<span class="log-cal-unit"> cal</span></div>
            <button class="delete-btn" onclick="handleDelete('${r.id}', document.getElementById('record-${r.id}'))" aria-label="Delete entry">
              ${trashIcon()}
            </button>
          </div>
        </div>`).join('');

  document.getElementById('username').textContent = name || 'Macro';
  document.getElementById('main-content').innerHTML = `
    <div class="section">
      <div class="calorie-card">
        <div class="calorie-top">
          <div class="ring-wrap">${ring(calPct)}<div class="ring-center"><div class="ring-pct">${calPct}%</div><div class="ring-sub">of goal</div></div></div>
          <div class="cal-info">
            <div class="cal-label">Calories remaining</div>
            <div class="cal-remain">${remain.toLocaleString()}<span class="cal-unit">cal</span></div>
            <div class="cal-meta">${totals.calories.toLocaleString()} eaten · ${goals.calories.toLocaleString()} goal</div>
          </div>
        </div>
        <div class="cal-divider"></div>
        <div class="cal-stats">
          <div class="cal-stat"><div class="cal-stat-num">${totals.calories.toLocaleString()}</div><div class="cal-stat-label">Eaten</div></div>
          <div class="cal-stat"><div class="cal-stat-num">${remain.toLocaleString()}</div><div class="cal-stat-label">Remaining</div></div>
          <div class="cal-stat"><div class="cal-stat-num">${goals.calories.toLocaleString()}</div><div class="cal-stat-label">Goal</div></div>
        </div>
      </div>
    </div>

    <div class="section" style="padding-top:24px">
      <div class="section-label">Macros</div>
      <div class="macro-grid">
        <div class="macro-card"><div class="macro-header"><div class="macro-name">Protein</div><div class="macro-val">${totals.protein}g / ${goals.protein}g</div></div>${bar(Math.round((totals.protein/goals.protein)*100),'#000')}</div>
        <div class="macro-card"><div class="macro-header"><div class="macro-name">Carbs</div><div class="macro-val">${totals.carbs}g / ${goals.carbs}g</div></div>${bar(Math.round((totals.carbs/goals.carbs)*100),'#555')}</div>
        <div class="macro-card"><div class="macro-header"><div class="macro-name">Fat</div><div class="macro-val">${totals.fat}g / ${goals.fat}g</div></div>${bar(Math.round((totals.fat/goals.fat)*100),'#aaa')}</div>
      </div>
    </div>

    <div class="section" style="padding-top:24px">
      <div class="section-label">Today's log</div>
      <div class="log-list">${logHTML}</div>
    </div>

    <div class="section" style="padding-top:24px">
      <div class="section-label">Log a meal</div>
      <div class="sms-cta"><div class="sms-number">+1 (647) 424-4438</div><div class="sms-label">Text this number to log any meal instantly</div></div>
    </div>`;
}

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.querySelector('svg').classList.add('spin');
  document.getElementById('greeting').textContent = getGreeting();
  document.getElementById('date-pill').textContent = formatDate();

  const phone = getPhone();

  if (!phone) {
    document.getElementById('main-content').innerHTML = `<div class="no-phone"><div class="no-phone-icon">👋</div><div class="no-phone-title">Welcome to Macro</div><div class="no-phone-sub">Text the number below to get started. You'll receive your personal dashboard link after setup.</div><div class="no-phone-number">+1 (647) 424-4438</div></div>`;
    btn.querySelector('svg').classList.remove('spin');
    return;
  }

  try {
    const formattedPhone = phoneWithPlus(phone);
    const [userRecords, logRecords] = await Promise.all([
      airtableFetch('Users', `{Phone} = "${formattedPhone}"`),
      airtableFetch('Food Logs', `{User Phone} = "${formattedPhone}"`)
    ]);

    const user = userRecords[0];
    const todayLogs = logRecords.filter(r => isToday(r.createdTime));
    const name = user?.fields['Name']?.split(' ')[0] || '';

    const goals = {
      calories: user?.fields['Daily Calorie Target'] || 2000,
      protein: user?.fields['Daily Protein Target'] || 150,
      carbs: user?.fields['Daily Carb Target'] || 200,
      fat: user?.fields['Daily Fat Target'] || 65
    };

    const totals = todayLogs.reduce((a, r) => ({
      calories: a.calories + Number(r.fields['Calories'] || 0),
      protein: a.protein + Number(r.fields['Protein (g)'] || 0),
      carbs: a.carbs + Number(r.fields['Carbs (g)'] || 0),
      fat: a.fat + Number(r.fields['Fat (g)'] || 0)
    }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

    render(todayLogs, totals, goals, name);

  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="loading-state"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">Could not load data</div><div style="font-size:14px">Check your connection and try refreshing.</div></div>`;
  }

  btn.querySelector('svg').classList.remove('spin');
}

loadData();
</script>
</body>
</html>
